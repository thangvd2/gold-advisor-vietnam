<div class="card-glow rounded-2xl bg-charcoal-700/60 border border-gold-500/15 overflow-hidden">
  <div class="p-4 sm:p-6 border-b border-gold-500/10 flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3">
    <h2 class="text-sm font-semibold uppercase tracking-[0.15em] text-charcoal-200">Gap History</h2>
    <div class="flex items-center gap-1 bg-charcoal-800/80 rounded-lg p-0.5" id="gap-timeframe-btns">
      <button onclick="updateGapRange('1D')" data-range="1D" class="tf-btn px-3 py-1 text-xs font-semibold rounded-md transition-all text-charcoal-400 hover:text-charcoal-200">1D</button>
      <button onclick="updateGapRange('1W')" data-range="1W" class="tf-btn px-3 py-1 text-xs font-semibold rounded-md transition-all bg-gold-500 text-charcoal-900">1W</button>
      <button onclick="updateGapRange('1M')" data-range="1M" class="tf-btn px-3 py-1 text-xs font-semibold rounded-md transition-all text-charcoal-400 hover:text-charcoal-200">1M</button>
      <button onclick="updateGapRange('3M')" data-range="3M" class="tf-btn px-3 py-1 text-xs font-semibold rounded-md transition-all text-charcoal-400 hover:text-charcoal-200">3M</button>
      <button onclick="updateGapRange('1Y')" data-range="1Y" class="tf-btn px-3 py-1 text-xs font-semibold rounded-md transition-all text-charcoal-400 hover:text-charcoal-200">1Y</button>
    </div>
  </div>
  <div class="px-4 sm:px-6 pb-4 sm:pb-6">
    <div class="relative h-[280px] sm:h-[320px]">
      <canvas id="gapChart"></canvas>
    </div>
  </div>
</div>
