<div class="card-glow rounded-2xl bg-charcoal-700/60 border border-gold-500/15 overflow-hidden">
  <div class="p-4 sm:p-6 border-b border-gold-500/10 flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3">
    <h2 class="text-sm font-semibold uppercase tracking-[0.15em] text-charcoal-300">Price History</h2>
    <div class="flex items-center gap-1 bg-charcoal-800/80 rounded-lg p-0.5" id="price-timeframe-btns">
      <button onclick="updatePriceRange('1D')" data-range="1D" class="tf-btn px-3 py-1 text-xs font-semibold rounded-md transition-all text-charcoal-400 hover:text-charcoal-200">1D</button>
      <button onclick="updatePriceRange('1W')" data-range="1W" class="tf-btn px-3 py-1 text-xs font-semibold rounded-md transition-all text-charcoal-400 hover:text-charcoal-200">1W</button>
      <button onclick="updatePriceRange('1M')" data-range="1M" class="tf-btn px-3 py-1 text-xs font-semibold rounded-md transition-all bg-gold-500 text-charcoal-900">1M</button>
      <button onclick="updatePriceRange('1Y')" data-range="1Y" class="tf-btn px-3 py-1 text-xs font-semibold rounded-md transition-all text-charcoal-400 hover:text-charcoal-200">1Y</button>
    </div>
  </div>
  <div class="px-4 sm:px-6 pb-4 sm:pb-6">
    <div class="flex items-center gap-4 mb-3 text-xs">
      <span class="flex items-center gap-1.5"><span class="w-3 h-0.5 rounded bg-gold-500 inline-block"></span><span class="text-charcoal-400">SJC Bar</span></span>
      <span class="flex items-center gap-1.5"><span class="w-3 h-0.5 rounded bg-gold-300 inline-block"></span><span class="text-charcoal-400">Ring Gold</span></span>
      <span class="flex items-center gap-1.5"><span class="w-3 h-0.5 rounded bg-blue-400 inline-block"></span><span class="text-charcoal-400">Intl Gold</span></span>
    </div>
    <div class="relative h-[280px] sm:h-[320px]">
      <canvas id="priceChart"></canvas>
    </div>
  </div>
</div>
